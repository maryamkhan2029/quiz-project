<!DOCTYPE html>
<html>
<head>
<title>Quiz Result</title>

<style>
body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:30px;
    width:500px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:15px;
}

.stat{
    margin:10px 0;
    background:#f4f4f4;
    padding:10px;
    border-radius:10px;
}

.pass{
    color:green;
    font-size:24px;
    font-weight:bold;
}

.fail{
    color:red;
    font-size:24px;
    font-weight:bold;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    background:#4f46e5;
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

.btn:hover{
    opacity:0.9;
}
</style>

</head>

<body>

<div class="card">

    <h2>🎉 Quiz Result</h2>

    <div class="stat">Score: {{ score }}/{{ total }}</div>
    <div class="stat">Wrong: {{ wrong }}</div>
    <div class="stat">Percentage: {{ percentage }}%</div>

    <div class="stat">📝 {{ remark }}</div>

    {% if status == "PASS" %}
        <div class="pass">🏆 PASS</div>
    {% else %}
        <div class="fail">❌ FAIL</div>
    {% endif %}

    <!-- Buttons -->
    <a href="/quiz" class="btn">🔄 Retry Quiz</a>
    <a href="/logout" class="btn" style="background:red;">🚪 Logout</a>

    <a href="/certificate" class="btn" style="background:green;">
        🎓 Download Certificate
    </a>

</div>

</body>
</html>
