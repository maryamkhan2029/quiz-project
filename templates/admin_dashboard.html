<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #111827;
            position: fixed;
            padding: 20px;
            color: white;
        }

        .sidebar h4 {
            color: white;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #ccc;
            padding: 10px;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .sidebar a:hover {
            background: #1f2937;
            color: white;
        }

        /* Main */
        .main {
            margin-left: 240px;
            padding: 20px;
        }

        /* Cards */
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0px 3px 10px rgba(0,0,0,0.08);
            margin-bottom: 15px;
        }

        .btn-edit {
            background: #f59e0b;
            color: white;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
        }

        .btn-edit:hover, .btn-delete:hover {
            opacity: 0.85;
            color: white;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .badge-title {
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>Quiz Admin</h4>

    <a href="/admin/dashboard"><i class="fa fa-home"></i> Dashboard</a>
    <a href="/admin/add"><i class="fa fa-plus"></i> Add Question</a>
    <a href="/admin/logout"><i class="fa fa-sign-out"></i> Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <div class="badge-title">All Questions</div>
        <a href="/admin/add" class="btn btn-success">
            <i class="fa fa-plus"></i> Add Question
        </a>
    </div>

    {% for q in questions %}

    <div class="card p-3">

        <h5>{{ loop.index }}. {{ q[1] }}</h5>

        <p>A) {{ q[2] }}</p>
        <p>B) {{ q[3] }}</p>
        <p>C) {{ q[4] }}</p>
        <p>D) {{ q[5] }}</p>

        <p><b>Answer:</b> {{ q[6] }}</p>

        <div>
            <a href="/admin/edit/{{ q[0] }}" class="btn btn-edit btn-sm">
                <i class="fa fa-edit"></i> Edit
            </a>

            <a href="/admin/delete/{{ q[0] }}" class="btn btn-delete btn-sm"
               onclick="return confirm('Delete this question?')">
                <i class="fa fa-trash"></i> Delete
            </a>
        </div>

    </div>

    {% endfor %}

</div>

</body>
</html>
