<!DOCTYPE html>
<html>
<head>
    <title>Edit Question</title>
    <style>
        body { font-family: Arial; background:#f4f4f4; }
        .box {
            width: 50%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }
        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="box">

<h2>Edit Question</h2>

<form method="POST">

    <input name="question" value="{{ q[1] }}">
    <input name="a" value="{{ q[2] }}">
    <input name="b" value="{{ q[3] }}">
    <input name="c" value="{{ q[4] }}">
    <input name="d" value="{{ q[5] }}">
    <input name="answer" value="{{ q[6] }}">

    <button type="submit">Update</button>

</form>

</div>

</body>
</html>
