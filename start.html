<!DOCTYPE html>
<html>
<head>
<title>Start Quiz</title>

<style>
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#141e30,#243b55);
}

.card{
    background:white;
    padding:50px;
    border-radius:20px;
    text-align:center;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
    color:#243b55;
    margin-bottom:10px;
}

p{
    color:gray;
    margin-bottom:20px;
}

a{
    text-decoration:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}
</style>

</head>

<body>

<div class="card">

    <h2>🎯 Ready for Quiz?</h2>
    <p>Start your test and discover your result.</p>

    <a href="/quiz">
        <button>Start Quiz</button>
    </a>

</div>

</body>
</html>
